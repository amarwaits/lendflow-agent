version: "3.9"

services:
  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: lendflow-ml-service
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lendflow-backend
    env_file:
      - ./backend_node/.env
    environment:
      DB_PATH: /data/loan_onboarding.db
      ML_SERVICE_URL: http://ml-service:8002
    ports:
      - "8001:8001"
    volumes:
      - db_data:/data
    depends_on:
      ml-service:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: lendflow-frontend
    working_dir: /app/frontend
    command: sh -c "yarn install && REACT_APP_BACKEND_URL=http://localhost:8001 yarn start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
