version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lendflow-backend
    env_file:
      - ./backend_node/.env
    environment:
      DB_PATH: /data/loan_onboarding.db
    ports:
      - "8001:8001"
    volumes:
      - db_data:/data

  frontend:
    image: node:20-alpine
    container_name: lendflow-frontend
    working_dir: /app/frontend
    command: sh -c "yarn install && REACT_APP_BACKEND_URL=http://localhost:8001 yarn start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
